<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Premium Expense Management App - Track, manage, and analyze your expenses with style">
    <title>ExpenseFlow - Smart Expense Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Animated Background -->
        <div class="bg-animation">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <!-- Login Page -->
        <section id="login-page" class="page active">
            <div class="login-container">
                <div class="login-card glass-card">
                    <div class="logo">
                        <div class="logo-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                                <path d="M2 17l10 5 10-5" />
                                <path d="M2 12l10 5 10-5" />
                            </svg>
                        </div>
                        <h1>ExpenseFlow</h1>
                    </div>
                    <p class="tagline">Smart expense tracking for modern life</p>

                    <!-- Auth Mode Toggle -->
                    <div class="auth-toggle">
                        <button type="button" class="auth-toggle-btn active" id="signin-tab">Sign In</button>
                        <button type="button" class="auth-toggle-btn" id="signup-tab">Create Account</button>
                    </div>

                    <form id="login-form" class="login-form">
                        <input type="hidden" id="auth-mode" value="signin">
                        <div class="input-group">
                            <input type="email" id="login-email" required autocomplete="email">
                            <label for="login-email">Email Address</label>
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path
                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                    <polyline points="22,6 12,13 2,6" />
                                </svg>
                            </span>
                        </div>
                        <div class="input-group">
                            <input type="password" id="login-password" required autocomplete="current-password"
                                minlength="6">
                            <label for="login-password">Password (min 6 characters)</label>
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0110 0v4" />
                                </svg>
                            </span>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full" id="auth-submit-btn">
                            <span>Sign In</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7" />
                            </svg>
                        </button>
                    </form>

                    <div class="auth-divider">
                        <span>OR</span>
                    </div>

                    <button type="button" class="btn btn-google btn-full" id="google-signin-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                            <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                                <path fill="#4285F4"
                                    d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z" />
                                <path fill="#34A853"
                                    d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.059 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z" />
                                <path fill="#FBBC05"
                                    d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.734 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z" />
                                <path fill="#EA4335"
                                    d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z" />
                            </g>
                        </svg>
                        <span>Sign in with Google</span>
                    </button>

                    <button type="button" class="btn btn-secondary btn-full btn-demo" id="guest-mode-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <span>Continue as Guest</span>
                    </button>

                    <div class="forgot-password-link">
                        <a href="#" id="forgot-password-btn">Forgot your password?</a>
                    </div>

                    <div class="login-footer">
                        <p id="auth-footer-text">Don't have an account? Click "Create Account" above</p>
                    </div>
                </div>
            </div>

            <!-- Forgot Password Modal -->
            <div class="modal-overlay" id="forgot-password-modal">
                <div class="modal glass-card modal-small">
                    <div class="modal-header">
                        <h3>Reset Password</h3>
                        <button class="modal-close" id="close-forgot-modal">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18" />
                                <line x1="6" y1="6" x2="18" y2="18" />
                            </svg>
                        </button>
                    </div>
                    <form id="forgot-password-form" class="forgot-form">
                        <p class="modal-description">Enter your email address and we'll send you a link to reset your
                            password.</p>
                        <div class="input-group">
                            <input type="email" id="forgot-email" required autocomplete="email" placeholder=" ">
                            <label for="forgot-email">Email Address</label>
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path
                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                    <polyline points="22,6 12,13 2,6" />
                                </svg>
                            </span>
                        </div>
                        <div class="modal-actions">
                            <button type="button" class="btn btn-secondary" id="cancel-forgot">Cancel</button>
                            <button type="submit" class="btn btn-primary">Send Reset Link</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <!-- Toast Notification -->
        <div class="toast" id="toast">
            <div class="toast-icon"></div>
            <span class="toast-message"></span>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Firebase Configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdHTEIKtETvGkRl31aeQNjgISYfJyUfXY",
            authDomain: "expensemanagment-f7923.firebaseapp.com",
            projectId: "expensemanagment-f7923",
            storageBucket: "expensemanagment-f7923.firebasestorage.app",
            messagingSenderId: "947542609930",
            appId: "1:947542609930:web:28cdd9f13e4428efd7cff3",
            measurementId: "G-Y50JH85XKK"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Make Firebase available globally
        window.firebaseDB = db;
        window.firebaseAuth = auth;
        window.firebaseModules = {
            collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, setDoc,
            signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail,
            GoogleAuthProvider, signInWithPopup, signInAnonymously
        };
    </script>
    <script src="app.js" type="module"></script>
</body>

</html>
